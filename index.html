<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias Tech & Ciencia</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <header class="py-5 text-center text-light bg-dark bg-gradient shadow-sm">
        <h1 class="display-4 fw-bold">🧠 Tech & Ciencia News</h1>
        <p class="lead">Las últimas novedades en innovación y descubrimiento</p>
    </header>

    <main class="container my-5 flex-grow-1">
        <div id="news-container" class="row g-4">
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Cargando noticias...</h5>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-5">
            <button class="btn btn-info btn-lg shadow fw-bold text-white" onclick="downloadTop10()">
                📥 Descargar Top 10 en TXT
            </button>
        </div>
    </main>

    <footer class="text-center py-4 text-secondary bg-dark mt-auto">
        <div class="container">
            <small>© 2026 Tech & Ciencia News | Inspirado en Daily News</small>
        </div>
    </footer>

   <script type="module" src="script.js"></script>
</body>
</html>
